version: 2

sources:
  - name: adw
    database: fea_academy
    schema: adventure_works
    tables:

    #SALES
      - name: sales_salesorderheader
        description: fact table de orders da Adventure Works. PK = salesorderid. Grao = order. Possui data, status, territory, credit card e business_entity_id
        columns:
          - name: salesorderid
            description: Chave primária da tabela salesorderheader
            tests:
              - unique
              - not_null

      - name: sales_salesorderdetail
        description: fact table de detalhes de cada order. Grao = produto. Possui produto, quantidade, preco unitario, e desconto
        columns:
          - name: salesorderdetailid
            description: Chave primária da tabela sales_salesorderdetail
            tests:
              - unique
              - not_null
      

    #PRODUCT
      - name: production_product
        description: dim table de produtos
        columns:
          - name: productid
            description: Chave primária da tabela production_product
            tests:
              - unique
              - not_null

      - name: production_productsubcategory
        description: para complementar a dim table de produtos
        columns:
          - name: productsubcategoryid
            description: Chave primária da tabela production_productsubcategory
            tests:
              - unique
              - not_null

      - name: production_productcategory
        description: para complementar dim table de produtos
        columns:
          - name: productcategoryid
            description: Chave primária da tabela production_productcategory
            tests:
              - unique
              - not_null


      #REASON
      - name: sales_salesorderheadersalesreason
        description: bridge table para conectar orders com a salesreason pelo salesreasonid
    
        columns:
          - name: salesorderid
            description: Chave estrangeira para a tabela salesorderheader
            tests:
              - not_null

          - name: salesreasonid
            description: Chave estrangeira para a tabela salesreason.
            tests:
              - not_null
            
      - name: sales_salesreason
        description: tabela que traz a reason da venda e type
        columns:
          - name: salesreasonid
            description: Chave primária da tabela sales_salesreason
            tests:
              - not_null

      
      #LOCATION
      - name: person_countryregion
        description: dim table com o país para linkar na tabela person_stateprovince. Não tem o teste not_null porque temos uma linha com countryregioncode nulo (Namibia)
        columns:
          - name: countryregioncode
            description: Chave primária da tabela
            tests:
              - unique

      - name: person_stateprovince
        description: dim table com o state, para linkar com a tabela address
        columns:
          - name: stateprovinceid
            description: Chave primária da tabela person_stateprovince
            tests:
              - not_null
              - unique
      
      - name: person_address
        description: dim table para nome da cidade
        columns:
          - name: addressid
            description: Chave primária da tabela address
            tests:
              - not_null
              - unique


    #CREDIT CARD
      - name: sales_creditcard
        description: dim table com informacao do tipo de cartao de credito
        columns:
          - name: creditcardid
            description: Chave primária da tabela address
            tests:
              - not_null
              - unique


    # CUSTOMER 
      - name: sales_customer
        description: bridge table para ligar personid com a tabela person_person
        columns:
          - name: customerid
            description: Chave primaria da tabela 
            tests:
              - not_null
              - unique
      
      - name: person_person
        description: dim table com o nome do cliente
        columns:
          - name: businessentityid
            description: Chave primária da tabela 
            tests:
              - not_null
              - unique

      - name: sales_store
        description: dim table com o nome do cliente caso seja uma loja
        columns:
          - name: businessentityid
            description: Chave primária da tabela 
            tests:
              - not_null
              - unique
      
    
      - name: sales_specialoffer
        description: dim table das offers
      